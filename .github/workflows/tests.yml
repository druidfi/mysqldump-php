name: Run tests

permissions:
  contents: read # For reading the repository

on:
  push:
    branches:
      # Push events on 2.x maintenance branch
      - 2.x
  pull_request:

jobs:

  tests:

    runs-on: ${{ matrix.os }}

    services:
      db:
        image: ${{ matrix.database_image }}
        env:
          # The MySQL docker container requires these environment variables to be set
          # so we can create and migrate the test database.
          # See: https://hub.docker.com/_/mysql
          MARIADB_ROOT_PASSWORD: example
          MYSQL_ROOT_PASSWORD: example
          MYSQL_DATABASE: example
          MYSQL_USER: example
          MYSQL_PASSWORD: example
          MYSQL_AUTHENTICATION_PLUGIN: ${{ matrix.auth_plugin }}
          # MySQL 8.4 disables mysql_native_password by default, but the
          # MariaDB client on the runner cannot use caching_sha2_password
          # without TLS, so the plugin is re-enabled via server flag.
          MYSQL_EXTRA_FLAGS: ${{ matrix.mysql_extra_flags }}
        ports:
          # Opens port 3306 on service container and host
          # https://docs.github.com/en/actions/using-containerized-services/about-service-containers
          - 3306:3306
          # Before continuing, verify the mysql container is reachable from the ubuntu host
        options: --name db --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    strategy:
      fail-fast: false
      matrix:
        include:

          # MySQL 8.0
          - os: ubuntu-24.04
            database: mysql
            database_image: bitnamilegacy/mysql:8.0.40
            php-version: 8.1
            auth_plugin: mysql_native_password
          - os: ubuntu-24.04
            database: mysql
            database_image: bitnamilegacy/mysql:8.0.40
            php-version: 8.2
            auth_plugin: mysql_native_password
          - os: ubuntu-24.04
            database: mysql
            database_image: bitnamilegacy/mysql:8.0.40
            php-version: 8.3
            auth_plugin: mysql_native_password
          - os: ubuntu-24.04
            database: mysql
            database_image: bitnamilegacy/mysql:8.0.40
            php-version: 8.4
            auth_plugin: mysql_native_password
          - os: ubuntu-24.04
            database: mysql
            database_image: bitnamilegacy/mysql:8.0.40
            php-version: 8.5
            auth_plugin: mysql_native_password

          # MySQL 8.4 LTS (no auth_plugin: the default_authentication_plugin
          # server option was removed in 8.4)
          - os: ubuntu-24.04
            database: mysql
            database_image: bitnamilegacy/mysql:8.4.5
            php-version: 8.1
            mysql_extra_flags: --mysql-native-password=ON
          - os: ubuntu-24.04
            database: mysql
            database_image: bitnamilegacy/mysql:8.4.5
            php-version: 8.2
            mysql_extra_flags: --mysql-native-password=ON
          - os: ubuntu-24.04
            database: mysql
            database_image: bitnamilegacy/mysql:8.4.5
            php-version: 8.3
            mysql_extra_flags: --mysql-native-password=ON
          - os: ubuntu-24.04
            database: mysql
            database_image: bitnamilegacy/mysql:8.4.5
            php-version: 8.4
            mysql_extra_flags: --mysql-native-password=ON
          - os: ubuntu-24.04
            database: mysql
            database_image: bitnamilegacy/mysql:8.4.5
            php-version: 8.5
            mysql_extra_flags: --mysql-native-password=ON

          # MariaDB 10.11 LTS
          - os: ubuntu-22.04
            database: mariadb
            database_image: bitnamilegacy/mariadb:10.11.9
            php-version: 8.1
            auth_plugin: mysql_native_password
          - os: ubuntu-22.04
            database: mariadb
            database_image: bitnamilegacy/mariadb:10.11.9
            php-version: 8.2
            auth_plugin: mysql_native_password
          - os: ubuntu-22.04
            database: mariadb
            database_image: bitnamilegacy/mariadb:10.11.9
            php-version: 8.3
            auth_plugin: mysql_native_password
          - os: ubuntu-22.04
            database: mariadb
            database_image: bitnamilegacy/mariadb:10.11.9
            php-version: 8.4
            auth_plugin: mysql_native_password
          - os: ubuntu-22.04
            database: mariadb
            database_image: bitnamilegacy/mariadb:10.11.9
            php-version: 8.5
            auth_plugin: mysql_native_password

    steps:

      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 1
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}

      - name: Validate composer.json
        run: composer validate

      - name: Install Composer dependencies
        run: composer install --prefer-dist --optimize-autoloader --no-progress --no-interaction

      - name: Run Rector
        run: vendor/bin/rector process --dry-run --no-progress-bar --ansi

      - name: Run PHPStan
        run: vendor/bin/phpstan --error-format=github --no-progress --ansi

      - name: Run PHPunit tests
        run: vendor/bin/phpunit

      - name: Create user and databases for testing
        # Run inside the service container over the local socket: on
        # MySQL 8.4 the root user uses caching_sha2_password, which the
        # runner's MariaDB client cannot authenticate with over plain TCP.
        run: cat docker-entrypoint-initdb.d/${{ matrix.database }}-init.sql | docker exec -i -e MYSQL_PWD=example db mysql -uroot

      - name: Run test script
        run: |
          shopt -s expand_aliases
          alias mysqldump='docker exec db mysqldump'
          mysqldump --version
          cd tests/scripts && ./test.sh 127.0.0.1
